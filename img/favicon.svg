<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark container — the calendar shell -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#6d28d9"/>
  <!-- 3×3 dot grid representing day cells -->
  <circle cx="30" cy="32" r="6" fill="#ede9fe" opacity="0.5"/>
  <circle cx="50" cy="32" r="6" fill="#ede9fe" opacity="0.5"/>
  <circle cx="70" cy="32" r="6" fill="#ede9fe" opacity="0.5"/>

  <circle cx="30" cy="52" r="6" fill="#ede9fe" opacity="0.5"/>
  <!-- One highlighted "selected" cell -->
  <circle cx="50" cy="52" r="8" fill="#ede9fe"/>
  <circle cx="70" cy="52" r="6" fill="#ede9fe" opacity="0.5"/>

  <circle cx="30" cy="72" r="6" fill="#ede9fe" opacity="0.5"/>
  <circle cx="50" cy="72" r="6" fill="#ede9fe" opacity="0.5"/>
  <circle cx="70" cy="72" r="6" fill="#ede9fe" opacity="0.5"/>
</svg>
